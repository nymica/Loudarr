name: Build, Scan, and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-scan-release:
    runs-on: ubuntu-latest
    # Permissions required to create a release and push tags
    permissions:
      contents: write

    steps:
      - name: Check out the source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for accurate version tagging based on history

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build local image for testing & scanning first (with GHA caching)
      - name: Build local image for testing & scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: local-scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Run Trivy (Locked to immutable commit SHA for v0.36.0)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'local-scan-target:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 3. Generate the next incremental tag (Only if scan passes)
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # Automatically bumps v1.0.0 -> v1.0.1 if no major/minor keywords are in commits

      # 4. Create the GitHub Release using the new tag
      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}

# 5. Extract Docker metadata using the brand new tag
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/Loudarr
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value=${{ steps.tag_version.outputs.new_tag }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Push the Multi-Platform image using the official release tags and build cache
      - name: Build and push Multi-Platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loudarr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- SVG sprite -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ic-headphones" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
    <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
  </symbol>
  <symbol id="ic-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
  </symbol>
  <symbol id="ic-ban" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
  </symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="12 6 12 12 16 14"/>
  </symbol>
  <symbol id="ic-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>
  <symbol id="ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
  </symbol>
  <symbol id="ic-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"/>
    <polyline points="1 20 1 14 7 14"/>
    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
  </symbol>
  <symbol id="ic-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
    <polyline points="15 3 21 3 21 9"/>
    <line x1="10" y1="14" x2="21" y2="3"/>
  </symbol>
  <symbol id="ic-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </symbol>
  <symbol id="ic-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"/>
  </symbol>
  <symbol id="ic-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
  </symbol>
  <symbol id="ic-signal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="6" x2="1" y2="18"/>
    <line x1="6" y1="3" x2="6" y2="21"/>
    <line x1="11" y1="8" x2="11" y2="16"/>
    <line x1="16" y1="5" x2="16" y2="19"/>
    <line x1="21" y1="10" x2="21" y2="14"/>
  </symbol>
  <symbol id="ic-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </symbol>
</svg>

<div class="layout">
  <nav class="sidebar">
    <a class="sidebar-brand" href="{{ url_for('index') }}">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <span>Loudarr</span>
    </a>

    <ul class="nav-list">
      <li>
        <a href="{{ url_for('index') }}" class="nav-link {% if active == 'discover' %}is-active{% endif %}">
          <svg class="nav-icon"><use href="#ic-compass"/></svg>
          Discover
        </a>
      </li>
      <li>
        <a href="{{ url_for('ignored') }}" class="nav-link {% if active == 'ignored' %}is-active{% endif %}">
          <svg class="nav-icon"><use href="#ic-ban"/></svg>
          Ignored
        </a>
      </li>
      <li>
        <a href="{{ url_for('history') }}" class="nav-link {% if active == 'history' %}is-active{% endif %}">
          <svg class="nav-icon"><use href="#ic-clock"/></svg>
          Added History
        </a>
      </li>
      <li>
        <a href="{{ url_for('library_health') }}" class="nav-link {% if active == 'library-health' %}is-active{% endif %}">
          <svg class="nav-icon"><use href="#ic-activity"/></svg>
          Library Health
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="{{ url_for('settings') }}" class="nav-link {% if active == 'settings' %}is-active{% endif %}">
        <svg class="nav-icon"><use href="#ic-settings"/></svg>
        Settings
      </a>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Add Artist Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Artist</h2>
      <button class="btn-icon" onclick="closeModal()" aria-label="Close">
        <svg class="icon"><use href="#ic-x"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="artist-preview" id="modal-preview">
        <img id="modal-img" src="" alt="" class="artist-thumb" style="display:none">
        <div class="artist-preview-info">
          <div id="modal-name" class="preview-name"></div>
          <div id="modal-tags" class="preview-tags"></div>
          <div id="modal-listeners" class="preview-listeners"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="sel-quality">Quality Profile</label>
          <select id="sel-quality" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="sel-metadata">Metadata Profile</label>
          <select id="sel-metadata" class="form-select"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="sel-root">Root Folder</label>
        <select id="sel-root" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="sel-monitor">Monitor</label>
        <select id="sel-monitor" class="form-select">
          <option value="all">All Albums</option>
          <option value="future">Future Albums</option>
          <option value="missing">Missing Albums</option>
          <option value="existing">Existing Albums</option>
          <option value="first">First Album</option>
          <option value="latest">Latest Album</option>
          <option value="none">None</option>
        </select>
      </div>
      <label class="form-check">
        <input type="checkbox" id="chk-search" checked>
        <span>Start search for missing albums immediately</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-add" onclick="confirmAdd()">
        <svg class="icon"><use href="#ic-plus"/></svg>
        Add Artist
      </button>
    </div>
  </div>
</div>

<div id="toasts" class="toast-stack"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>

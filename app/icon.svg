<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#252848"/>
      <stop offset="100%" stop-color="#09090f"/>
    </radialGradient>
    <clipPath id="radar-clip">
      <!-- Only show arcs to the right of the note head center -->
      <rect x="178" y="0" width="512" height="512"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Sonar / radar arcs emanating right from the note-head center -->
  <circle cx="178" cy="268" r="88"
          fill="none" stroke="#2dd4bf" stroke-width="15" opacity="0.75"
          clip-path="url(#radar-clip)"/>
  <circle cx="178" cy="268" r="152"
          fill="none" stroke="#2dd4bf" stroke-width="11" opacity="0.44"
          clip-path="url(#radar-clip)"/>
  <circle cx="178" cy="268" r="216"
          fill="none" stroke="#2dd4bf" stroke-width="7.5" opacity="0.22"
          clip-path="url(#radar-clip)"/>

  <!-- Note head — filled ellipse, tilted -->
  <ellipse cx="178" cy="273" rx="54" ry="39"
           transform="rotate(-18 178 273)" fill="white"/>

  <!-- Note stem — runs from top of note-head up to near top of icon -->
  <rect x="218" y="80" width="15" height="202" rx="7.5" fill="white"/>

  <!-- Small teal pulse dot at note-head centre (radar source point) -->
  <circle cx="178" cy="268" r="11" fill="#2dd4bf"/>
</svg>
